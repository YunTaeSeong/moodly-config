spring:
  datasource:
    url: jdbc:mysql://moodly-auth-db:3306/moodly_auth?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: when-authorized
    shutdown:
      access: unrestricted
  info:
    env:
      enabled: true

security:
  jwt:
    common:
      secret: ${JWT_SECRET}

user-service:
  url: http://moodly-user:8082

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}

eureka:
  client:
    service-url:
      defaultZone: http://moodly-eurekaserver:8070/eureka

info:
  app:
    name: "auth-service"
    description: "docker"