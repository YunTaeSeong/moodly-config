spring:
  data:
    redis:
      host: moodly-redis
      port: 6379

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:moodly-kafka:29092}

  datasource:
    url: jdbc:mysql://moodly-product-db:3306/moodly_product?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
    shutdown:
      access: unrestricted
  info:
    env:
      enabled: true

security:
  jwt:
    common:
      secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://moodly-eureka:8070/eureka

info:
  app:
    name: "product-service"
    description: "docker"