server:
  port: 8082

spring:
  application:
    name: user-service
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

security:
  jwt:
    common:
      issuer: moodly-auth
      audience: moodly-api
      roles-claim: roles

app:
  mail:
    from: ${NAVER_MAIL_USERNAME}
  frontend:
    base-url: http://localhost:3000

coupon-service:
  url: http://localhost:8087

eureka:
  instance:
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true