spring:
  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    enabled: true

  datasource:
    url: jdbc:h2:mem:testdb_product;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
    shutdown:
      access: unrestricted
  info:
    env:
      enabled: true

security:
  jwt:
    common:
      secret: "bW9vZGx5LXRlc3Qtand0LXNlY3JldC0yMDI2" # 테스트용 secret
      access-token-ttl-seconds: 900
      refresh-token-ttl-seconds: 604800
      issuer: moodly-auth
      audience: moodly-api
      roles-claim: roles

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8070/eureka

info:
  app:
    name: "product-service"
    description: "test"