spring:
  data:
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  datasource:
    url: jdbc:mysql://localhost:3315/moodly_notification?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
    shutdown:
      access: unrestricted
  info:
    env:
      enabled: true

security:
  jwt:
    common:
      secret: ${JWT_SECRET}

user:
  service:
    url: ${USER_SERVICE_URL:http://localhost:8082}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8070/eureka

info:
  app:
    name: "notification-service"
    description: "local"